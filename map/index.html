<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUPS! Festival  9-11 April</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
 <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/LogO.png">

<!-- Social Share (Open Graph) -->
<meta property="og:title" content="OUPS! Festival 9-11 April">
<meta property="og:description" content="Artistique Interventions in Public Space">
<meta property="og:image" content="https://oupsfestival.be/map/images/SocialLogo.png">
<meta property="og:url" content="https://oupsfestival.be/">
<meta property="og:type" content="website">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
  
</head>
<body>
  <header>
    <div class="logo-oups">
      <img src="images/gif qui changent/final.gif" alt="OUPS logo">
    </div>
    <nav class="main-menu">
      <ul>
        <li><a href="index.html"><img src="images/gif qui changent/carte.gif" alt="Carte" class="menu-gif"></a></li>
        <li><a href="events.html"><img src="images/gif qui changent/artist.gif" alt="Events" class="menu-gif"></a></li>
        <li><a href="propose.html"><img src="images/gif qui changent/about.gif" alt="About" class="menu-gif"></a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div id="map"></div>
    <div id="event-panel" class="event-panel hidden">
      <div class="event-panel-header">
        <h3>Nouvel événement</h3>
        <button id="close-panel" aria-label="Fermer">✕</button>
      </div>
      <form id="event-form">
        <label>Coords <span id="coords"></span></label>
        <input type="text" id="title" name="title" placeholder="Titre" required>
        <input type="text" id="artist" name="artist" placeholder="Nom d'artiste" required>
        <input type="date" id="date" name="date" required>
        <input type="time" id="time" name="time" required>
        <input type="text" id="place" name="place" placeholder="Lieu" required>
        <input type="text" id="address" name="address" placeholder="Adresse du lieu" required>
        <textarea id="description" name="description" placeholder="Description" rows="3" required></textarea>
        <label for="photo">Photo (optionnel)</label>
        <input type="file" id="photo" name="photo" accept="image/*">
        <button type="submit">Ajouter</button>
      </form>
    </div>
    <div id="event-info"></div>
    <div class="contact-info">Contact : oups@cutey.com</div>
  </main>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
