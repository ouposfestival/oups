<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUPS - Admin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
   <!-- Favicon -->
  <link rel="icon" type="image/png" href="images/LogO.png">
  <style>
    .admin-photo-section {
      margin: 0.8em 0;
      display: flex;
      align-items: flex-start;
      gap: 1em;
    }
    .admin-photo-preview {
      max-width: 180px;
      max-height: 130px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid #333;
    }
    .admin-no-photo {
      width: 180px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      border: 1px dashed #444;
      border-radius: 6px;
      color: #555;
      font-style: italic;
      font-size: 0.85em;
    }
    .admin-photo-controls {
      display: flex;
      flex-direction: column;
      gap: 0.4em;
    }
    .admin-photo-controls button {
      padding: 0.4em 0.8em;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #fff;
      cursor: pointer;
      font-size: 0.85em;
      font-family: inherit;
      text-align: left;
      white-space: nowrap;
    }
    .admin-photo-controls button:hover {
      background: #b800ff;
    }
    .admin-photo-controls .photo-delete {
      background: #441111;
      color: #ff6677;
    }
    .admin-photo-controls .photo-delete:hover {
      background: #ff2244;
      color: #fff;
    }
    #crop-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .crop-modal-content {
      width: 90vw;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .crop-container {
      width: 100%;
      max-height: 65vh;
      overflow: hidden;
      border-radius: 8px;
      background: #111;
    }
    .crop-container img {
      max-width: 100%;
      display: block;
    }
    .crop-toolbar {
      display: flex;
      gap: 0.5em;
      margin-top: 1em;
      flex-wrap: wrap;
      justify-content: center;
    }
    .crop-toolbar button {
      padding: 0.5em 1em;
      border: none;
      border-radius: 6px;
      background: #333;
      color: #fff;
      cursor: pointer;
      font-size: 0.95em;
      font-family: inherit;
    }
    .crop-toolbar button:hover {
      background: #555;
    }
    .crop-toolbar .crop-save {
      background: #b800ff;
    }
    .crop-toolbar .crop-save:hover {
      background: #9500d1;
    }
    .crop-toolbar .crop-cancel {
      background: #ff2244;
    }
    .crop-toolbar .crop-cancel:hover {
      background: #cc1133;
    }

    @media (max-width: 768px) {
      .admin-photo-section {
        flex-direction: column;
        align-items: stretch;
      }
      .admin-photo-preview {
        max-width: 100%;
        max-height: 180px;
        width: 100%;
      }
      .admin-no-photo {
        width: 100%;
      }
      .admin-photo-controls {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.3em;
      }
      .admin-photo-controls button {
        flex: 1;
        min-width: 0;
        text-align: center;
        font-size: 0.8em;
        padding: 0.5em 0.4em;
      }
      .crop-modal-content {
        width: 95vw;
      }
      .crop-container {
        max-height: 50vh;
      }
      .crop-toolbar {
        gap: 0.3em;
      }
      .crop-toolbar button {
        padding: 0.4em 0.6em;
        font-size: 0.8em;
      }
      .admin-card {
        padding: 0.7em;
      }
      .admin-edit-form input,
      .admin-edit-form textarea {
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-oups">
      <a href="about.html"><img src="images/gif qui changent/final.gif" alt="OUPS logo"></a>
    </div>
    <nav class="main-menu">
      <ul>
        <li><a href="index.html"><img src="images/gif qui changent/carte.gif" alt="Carte" class="menu-gif"></a></li>
        <li><a href="events.html"><img src="images/gif qui changent/artist.gif" alt="Events" class="menu-gif"></a></li>
        <li><a href="program.html"><img src="images/gif qui changent/programtoni.gif" alt="Program" class="menu-gif" style="height:80px"></a></li>
      </ul>
    </nav>
  </header>
  <main class="events-page admin-page">
    <div id="password-gate">
      <h1>Admin</h1>
      <input type="password" id="admin-pw" placeholder="Mot de passe" style="padding:0.5em; font-size:1em; border-radius:6px; border:1px solid #555; background:#222; color:#fff;">
      <button id="admin-pw-btn" style="padding:0.5em 1em; background:#b800ff; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:1em; margin-left:0.5em;">Entrer</button>
      <p id="pw-error" style="color:#ff2244; display:none;">Mot de passe incorrect.</p>
    </div>
    <div id="admin-content" style="display:none;">
      <h1>Admin - Gérer les événements</h1>
      <div id="admin-list"></div>
    </div>
    <div id="crop-modal">
      <div class="crop-modal-content">
        <div class="crop-container">
          <img id="crop-image" src="" alt="Recadrer">
        </div>
        <div class="crop-toolbar">
          <button onclick="cropperInstance && cropperInstance.rotate(-90)" title="Rotation gauche">↺ 90°</button>
          <button onclick="cropperInstance && cropperInstance.rotate(90)" title="Rotation droite">↻ 90°</button>
          <button onclick="cropFlipH()" title="Miroir horizontal">↔ Miroir H</button>
          <button onclick="cropFlipV()" title="Miroir vertical">↕ Miroir V</button>
          <button onclick="cropperInstance && cropperInstance.setAspectRatio(NaN)">Libre</button>
          <button onclick="cropperInstance && cropperInstance.setAspectRatio(1)">1:1</button>
          <button onclick="cropperInstance && cropperInstance.setAspectRatio(4/3)">4:3</button>
          <button onclick="cropperInstance && cropperInstance.setAspectRatio(16/9)">16:9</button>
          <button onclick="cropperInstance && cropperInstance.reset()">Reset</button>
          <button class="crop-save" onclick="saveCrop()">Sauvegarder</button>
          <button class="crop-cancel" onclick="closeCropModal()">Annuler</button>
        </div>
      </div>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const ADMIN_PW_HASH = '5f4dcc3b5aa765d61d8327deb882cf99'; // not used, simple check
    document.getElementById('admin-pw-btn').addEventListener('click', checkPw);
    document.getElementById('admin-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPw(); });
    function checkPw() {
      if (document.getElementById('admin-pw').value === 'oupscutey') {
        document.getElementById('password-gate').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        render();
      } else {
        document.getElementById('pw-error').style.display = 'block';
      }
    }
  </script>
  <script>
    const adminList = document.getElementById('admin-list');
    let allEvents = [];

    async function render() {
      allEvents = await loadEventsFromDB();
      if (!allEvents.length) {
        adminList.innerHTML = '<p>Aucun événement.</p>';
        return;
      }
      adminList.innerHTML = allEvents.map((ev, i) => `
        <div class="admin-card" id="card-${i}">
          <div class="admin-card-header">
            <span class="admin-title">${ev.title}</span>
            <span class="admin-artist">${ev.artist || ''}</span>
          </div>
          <div class="admin-card-details">
            <p>${ev.place || ''} — ${ev.address || ''}</p>
            <p>${ev.date || ''} ${ev.time || ''}</p>
            <p>${ev.description || ''}</p>
          </div>
          <div class="admin-photo-section">
            ${ev.photo
              ? (ev.photo.startsWith('data:video/')
                ? `<video src="${ev.photo}" class="admin-photo-preview" controls></video>`
                : `<img src="${ev.photo}" class="admin-photo-preview">`)
              : `<div class="admin-no-photo">Pas de photo</div>`}
            <div class="admin-photo-controls">
              <button onclick="replacePhoto(${i})">${ev.photo ? 'Remplacer' : 'Ajouter photo'}</button>
              ${ev.photo && !ev.photo.startsWith('data:video/') ? `<button onclick="openCropModal(${i})">Recadrer</button>` : ''}
              ${ev.photo ? `<button class="photo-delete" onclick="deletePhoto(${i})">Supprimer photo</button>` : ''}
            </div>
          </div>
          <div class="admin-actions">
            <button onclick="editEvent(${i})">Modifier</button>
            <button class="admin-delete" onclick="deleteEvent(${i})">Supprimer</button>
          </div>
          <div class="admin-edit-form" id="edit-${i}" style="display:none;">
            <input type="text" id="edit-title-${i}" value="${(ev.title || '').replace(/"/g, '&quot;')}" placeholder="Titre">
            <input type="text" id="edit-artist-${i}" value="${(ev.artist || '').replace(/"/g, '&quot;')}" placeholder="Nom d'artiste">
            <input type="date" id="edit-date-${i}" value="${ev.date || ''}">
            <input type="time" id="edit-time-${i}" value="${ev.time || ''}">
            <input type="text" id="edit-place-${i}" value="${(ev.place || '').replace(/"/g, '&quot;')}" placeholder="Lieu">
            <input type="text" id="edit-address-${i}" value="${(ev.address || '').replace(/"/g, '&quot;')}" placeholder="Adresse">
            <textarea id="edit-desc-${i}" rows="3" placeholder="Description">${ev.description || ''}</textarea>
            <button onclick="saveEdit(${i})">Sauvegarder</button>
            <button onclick="cancelEdit(${i})">Annuler</button>
          </div>
        </div>
      `).join('');
    }

    async function deleteEvent(i) {
      if (!confirm('Supprimer cet événement ?')) return;
      await deleteEventFromDB(allEvents[i].id);
      render();
    }

    function editEvent(i) {
      document.getElementById('edit-' + i).style.display = 'block';
    }

    function cancelEdit(i) {
      document.getElementById('edit-' + i).style.display = 'none';
    }

    async function saveEdit(i) {
      const ev = allEvents[i];
      await updateEventInDB(ev.id, {
        title: document.getElementById('edit-title-' + i).value.trim(),
        artist: document.getElementById('edit-artist-' + i).value.trim(),
        date: document.getElementById('edit-date-' + i).value,
        time: document.getElementById('edit-time-' + i).value,
        place: document.getElementById('edit-place-' + i).value.trim(),
        address: document.getElementById('edit-address-' + i).value.trim(),
        description: document.getElementById('edit-desc-' + i).value.trim()
      });
      render();
    }

    // --- Photo management ---
    let cropperInstance = null;
    let cropEventIndex = null;

    function readFileAsDataURL(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    function replacePhoto(i) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,video/*,.gif';
      input.style.display = 'none';
      document.body.appendChild(input);
      input.onchange = async (e) => {
        const file = e.target.files[0];
        document.body.removeChild(input);
        if (!file) return;
        let photoData;
        if (file.type.startsWith('video/')) {
          photoData = await readFileAsDataURL(file);
        } else {
          photoData = await compressImage(file);
        }
        await updateEventInDB(allEvents[i].id, { photo: photoData });
        render();
      };
      input.click();
    }

    function openCropModal(i) {
      cropEventIndex = i;
      const modal = document.getElementById('crop-modal');
      const img = document.getElementById('crop-image');
      img.src = allEvents[i].photo;
      modal.style.display = 'flex';
      img.onload = () => {
        if (cropperInstance) cropperInstance.destroy();
        cropperInstance = new Cropper(img, {
          viewMode: 1,
          autoCropArea: 1,
          responsive: true,
          background: true,
        });
      };
    }

    function closeCropModal() {
      const modal = document.getElementById('crop-modal');
      modal.style.display = 'none';
      if (cropperInstance) {
        cropperInstance.destroy();
        cropperInstance = null;
      }
      cropEventIndex = null;
    }

    function cropFlipH() {
      if (!cropperInstance) return;
      const d = cropperInstance.getData();
      cropperInstance.scaleX(d.scaleX === -1 ? 1 : -1);
    }

    function cropFlipV() {
      if (!cropperInstance) return;
      const d = cropperInstance.getData();
      cropperInstance.scaleY(d.scaleY === -1 ? 1 : -1);
    }

    async function saveCrop() {
      if (!cropperInstance || cropEventIndex === null) return;
      const canvas = cropperInstance.getCroppedCanvas({ maxWidth: 1600, maxHeight: 1600 });
      const croppedData = canvas.toDataURL('image/jpeg', 0.8);
      await updateEventInDB(allEvents[cropEventIndex].id, { photo: croppedData });
      closeCropModal();
      render();
    }

    async function deletePhoto(i) {
      if (!confirm('Supprimer la photo de cet événement ?')) return;
      await updateEventInDB(allEvents[i].id, { photo: firebase.firestore.FieldValue.delete() });
      render();
    }

  </script>
</body>
</html>
