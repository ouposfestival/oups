<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUPS! Festival  9-11 April</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo-oups">
      <img src="images/gif qui changent/final.gif" alt="OUPS logo">
    </div>
    <nav class="main-menu">
      <ul>
        <li><a href="index.html"><img src="images/gif qui changent/carte.gif" alt="Carte" class="menu-gif"></a></li>
        <li><a href="events.html"><img src="images/gif qui changent/artist.gif" alt="Events" class="menu-gif"></a></li>
        <li><a href="propose.html"><img src="images/gif qui changent/about.gif" alt="About" class="menu-gif"></a></li>
      </ul>
    </nav>
  </header>
  <main class="events-page event-detail-page" style="padding-top: 220px;">
    <div id="event-detail"></div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const docId = params.get('id');
    const detail = document.getElementById('event-detail');

    async function loadDetail() {
      if (!docId) {
        detail.innerHTML = '<p>Événement introuvable.</p>';
        return;
      }
      try {
        const doc = await db.collection('events').doc(docId).get();
        if (!doc.exists) {
          detail.innerHTML = '<p>Événement introuvable.</p>';
          return;
        }
        const ev = doc.data();
        let html = '<div class="event-detail-content">';

        html += '<div class="event-detail-side">';
        html += `<p class="event-meta">${ev.address || ''}</p>`;
        html += `<p class="event-meta">${ev.place || ''}</p>`;
        if (ev.date) html += `<p class="event-meta">${ev.date}</p>`;
        if (ev.dateEnd) html += `<p class="event-meta">→ ${ev.dateEnd}</p>`;
        if (ev.time) html += `<p class="event-meta">${ev.time}</p>`;
        if (ev.contact) html += `<p class="event-meta">Contact : ${ev.contact}</p>`;
        html += '</div>';

        html += '<div class="event-detail-photo">';
        if (ev.photo) {
          if (ev.photo.startsWith('data:video/')) {
            html += `<video src="${ev.photo}" controls style="max-width:100%;"></video>`;
          } else {
            html += `<img src="${ev.photo}" alt="Photo de l'événement">`;
          }
        }
        html += '</div>';

        html += '<div class="event-detail-info">';
        html += `<h2>${ev.title}</h2>`;
        if (ev.artist) html += `<p class="event-detail-artist">${ev.artist}</p>`;
        html += `<p>${ev.description || ''}</p>`;
        html += '</div>';

        html += '</div>';
        detail.innerHTML = html;
      } catch (err) {
        detail.innerHTML = '<p>Erreur de chargement.</p>';
      }
    }
    loadDetail();
  </script>
</body>
</html>
